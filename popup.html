<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyword Highlighter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --border: #2e2e3e;
    --accent: #FFD700;
    --text: #e8e8f0;
    --muted: #7878a0;
    --radius: 6px;

    --c0: #FFD700; --c0t: #1a1a1a;
    --c1: #FF6B6B; --c1t: #fff;
    --c2: #51CF66; --c2t: #1a1a1a;
    --c3: #339AF0; --c3t: #fff;
    --c4: #F06595; --c4t: #fff;
    --c5: #FF922B; --c5t: #fff;
    --c6: #845EF7; --c6t: #fff;
    --c7: #20C997; --c7t: #1a1a1a;
    --c8: #F59F00; --c8t: #1a1a1a;
    --c9: #74C0FC; --c9t: #1a1a1a;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    width: 320px;
    min-height: 100px;
    padding: 0;
    overflow: hidden;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    flex: 1;
  }

  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .toggle-label {
    font-size: 12px;
    color: var(--muted);
  }

  .toggle {
    position: relative;
    width: 32px;
    height: 18px;
    cursor: pointer;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 18px;
    transition: background 0.2s;
  }

  .slider::before {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    left: 3px; top: 3px;
    background: var(--muted);
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }

  .toggle input:checked + .slider { background: #2a2a3e; }
  .toggle input:checked + .slider::before {
    transform: translateX(14px);
    background: var(--accent);
  }

  main { padding: 14px 16px; }

  .section-label {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .keywords-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 10px;
  }

  .keyword-row {
    display: flex;
    align-items: center;
    gap: 8px;
    animation: slideIn 0.15s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .color-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-left: 2px;
  }

  .keyword-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  .keyword-input:focus {
    border-color: var(--accent);
  }

  .keyword-input::placeholder { color: var(--muted); }

  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
  }

  .del-btn:hover { color: #FF6B6B; background: rgba(255,107,107,0.1); }

  .add-btn {
    width: 100%;
    background: none;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 7px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    margin-bottom: 14px;
  }

  .add-btn:hover { border-color: var(--accent); color: var(--accent); }

  .actions {
    display: flex;
    gap: 8px;
  }

  .btn {
    flex: 1;
    padding: 8px;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: #1a1a1a;
  }

  .btn-ghost {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  .status {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
    min-height: 16px;
    font-family: 'Space Mono', monospace;
  }

  .status.ok { color: #51CF66; }
</style>
</head>
<body>
<header>
  <span class="logo">⬡ Keyword Highlighter</span>
  <div class="toggle-wrap">
    <span class="toggle-label">On</span>
    <label class="toggle">
      <input type="checkbox" id="enableToggle" checked>
      <span class="slider"></span>
    </label>
  </div>
</header>

<main>
  <div class="section-label">Keywords</div>
  <div class="keywords-list" id="keywordsList"></div>
  <button class="add-btn" id="addBtn">+ Add keyword</button>
  <div class="actions">
    <button class="btn btn-ghost" id="clearBtn">Clear all</button>
    <button class="btn btn-primary" id="applyBtn">Apply</button>
  </div>
  <div class="status" id="status"></div>
</main>

<script src="popup.js"></script>
</body>
</html>
